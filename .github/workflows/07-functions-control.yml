name: 07 Functions Controls

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        version: [18, 20]
    runs-on: ubuntu-latest
    # continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup node environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.version }}
      - run: npm ci
      - run: npm test
      - name: Forzar fallo
        run: exit 1
      - name: Si el paso enterior esta ok
        if: ${{ success() }}
        run: echo "Paso anterior correcto"
      - name: Si el paso entarior falla
        if: ${{ failure() }}
        run: echo "El paso anterior fallo"
      - name: Se ejecuta siempre (falle o no el paso anterior)
        if: ${{ always() }}
        run: Paso se ejecuta siempre
      

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps: 
      - name: despliegue
        run: echo "Desplegando en AWS..." 